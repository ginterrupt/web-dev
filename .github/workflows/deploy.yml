name: Auto Deploy Website

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: admin
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 2278
          script: |
            cd ~/services/test-site/html
            git pull origin main
