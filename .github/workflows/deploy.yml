name: Deploy to Hetzner Server


on:
  push:
    branches:
      - main


jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP_HETDEV }}
          username: main
          port: 2278
          key: ${{ secrets.SSH_PRIVATE_KEY_HETDEV }}
          script: |
            /home/main/deploy-webhook.sh

